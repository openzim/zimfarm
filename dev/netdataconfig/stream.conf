# netdata master/parent stream configuration
# This file configures the parent netdata to accept streaming connections
# from child netdata instances (the task monitors)
[stream]
    enabled = yes
    mode = central

# Configuration for accepting streams with the development API key
[7DC0DDB8-8EAA-4391-AF5D-BE017EECF0EE]
    enabled = yes

    # Default memory mode for all hosts using this API key
    # none = no database, ram = in memory, dbengine = on disk
    default memory mode = dbengine

    # Default history in seconds to keep in memory
    default history = 3600

    # Enable health monitoring for streamed hosts
    health enabled by default = auto

    # Allow from specific IPs (optional, remove to allow from anywhere)
    # allow from = *

    # Postpone alarms for newly connected hosts
    default postpone alarms on connect seconds = 60
