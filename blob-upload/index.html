<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Image Blob Upload</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"
        />
        <style>
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                background-color: #f0f2f5;
            }

            .upload-container {
                width: 400px;
                max-width: 90%;
                background: white;
                border-radius: 12px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                padding: 24px;
            }

            .form-group {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .form-label {
                font-weight: 600;
                color: #334155;
                font-size: 1rem;
            }

            .drop-zone {
                position: relative;
                width: 100%;
                height: 250px;
                border: 2px dashed #cbd5e1;
                border-radius: 8px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                cursor: pointer;
                overflow: hidden;
                transition:
                    border-color 0.3s,
                    background-color 0.3s;
                box-sizing: border-box;
            }

            .drop-zone.active {
                border-color: #3b82f6;
                background-color: #eff6ff;
            }

            .drop-zone-text {
                color: #64748b;
                text-align: center;
                padding: 20px;
                pointer-events: none;
            }

            .drop-zone-text svg {
                width: 48px;
                height: 48px;
                margin-bottom: 12px;
                color: #94a3b8;
            }

            #file-input {
                display: none;
            }

            .preview-container {
                display: none;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #fff;
                flex-direction: column;
            }

            .image-workspace {
                position: relative;
                flex: 1;
                width: 100%;
                min-height: 0;
                overflow: hidden;
                background: #e2e8f0;
            }

            .image-workspace img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                display: block;
            }

            .preview-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 12px;
                background: #f8fafc;
                border-top: 1px solid #cbd5e1;
                font-size: 13px;
                height: 48px;
                box-sizing: border-box;
            }

            .dimensions-display {
                color: #475569;
                font-weight: 500;
            }

            .crop-actions {
                display: none;
                gap: 8px;
            }

            .btn-sm {
                padding: 6px 12px;
                font-size: 13px;
                font-weight: 600;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                transition: background 0.2s;
            }

            .save-crop-btn {
                background: rgba(34, 197, 94, 0.9);
                color: white;
            }

            .save-crop-btn:hover {
                background: rgba(22, 163, 74, 1);
            }

            .cancel-crop-btn {
                background: rgba(148, 163, 184, 0.9);
                color: white;
            }

            .cancel-crop-btn:hover {
                background: rgba(100, 116, 139, 1);
            }

            .action-btn {
                position: absolute;
                top: 8px;
                color: white;
                border: none;
                border-radius: 50%;
                width: 32px;
                height: 32px;
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                transition: background 0.2s;
                z-index: 10;
            }

            .delete-btn {
                right: 8px;
                background: rgba(239, 68, 68, 0.9);
            }

            .delete-btn:hover {
                background: rgba(220, 38, 38, 1);
            }

            .crop-btn {
                right: 48px;
                background: rgba(59, 130, 246, 0.9);
            }

            .crop-btn:hover {
                background: rgba(37, 99, 235, 1);
            }

            .action-btn svg {
                width: 16px;
                height: 16px;
            }
        </style>
    </head>
    <body>
        <div class="upload-container">
            <form id="upload-form">
                <div class="form-group">
                    <label for="file-input" class="form-label"
                        >Illustration</label
                    >
                    <div class="drop-zone" id="drop-zone">
                        <div class="drop-zone-text" id="drop-zone-text">
                            <svg
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
                                ></path>
                            </svg>
                            <p>Drag & drop an image here</p>
                            <p style="font-size: 0.875rem; margin-top: 8px">
                                or click to browse, or paste (Ctrl+V)
                            </p>
                        </div>

                        <div class="preview-container" id="preview-container">
                            <div class="image-workspace">
                                <img id="preview-img" src="" alt="Preview" />
                                <button
                                    type="button"
                                    class="action-btn crop-btn"
                                    id="crop-btn"
                                    aria-label="Crop image"
                                >
                                    <svg
                                        fill="none"
                                        stroke="currentColor"
                                        viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M14.385 15.385L18 19m-3.615-3.615l-3.615-3.615m3.615 3.615L10.77 19m3.615-3.615L18 11.77M6 5v14m12-14v4M5 6h14M5 18h4"
                                        ></path>
                                    </svg>
                                </button>
                                <button
                                    type="button"
                                    class="action-btn delete-btn"
                                    id="delete-btn"
                                    aria-label="Delete image"
                                >
                                    <svg
                                        fill="none"
                                        stroke="currentColor"
                                        viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                                        ></path>
                                    </svg>
                                </button>
                            </div>
                            <div class="preview-footer">
                                <div
                                    class="dimensions-display"
                                    id="dimensions-display"
                                ></div>
                                <div class="crop-actions" id="crop-actions">
                                    <button
                                        type="button"
                                        class="btn-sm cancel-crop-btn"
                                        id="cancel-crop-btn"
                                    >
                                        Abort
                                    </button>
                                    <button
                                        type="button"
                                        class="btn-sm save-crop-btn"
                                        id="save-crop-btn"
                                    >
                                        Save Crop
                                    </button>
                                </div>
                            </div>
                        </div>

                        <input type="file" id="file-input" accept="image/*" />
                    </div>
                </div>
            </form>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const dropZone = document.getElementById("drop-zone");
                const fileInput = document.getElementById("file-input");
                const previewContainer =
                    document.getElementById("preview-container");
                const previewImg = document.getElementById("preview-img");
                const deleteBtn = document.getElementById("delete-btn");
                const cropBtn = document.getElementById("crop-btn");
                const saveCropBtn = document.getElementById("save-crop-btn");
                const cancelCropBtn =
                    document.getElementById("cancel-crop-btn");
                const cropActions = document.getElementById("crop-actions");
                const dimensionsDisplay =
                    document.getElementById("dimensions-display");

                let currentObjectUrl = null;
                let cropper = null;

                previewImg.onload = function () {
                    if (this.src) {
                        dimensionsDisplay.textContent = `${this.naturalWidth} × ${this.naturalHeight} px`;
                    }
                };

                function destroyCropper() {
                    if (cropper) {
                        cropper.destroy();
                        cropper = null;
                    }
                    cropActions.style.display = "none";
                    cropBtn.style.display = "flex";
                }

                cropBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (!cropper) {
                        cropper = new Cropper(previewImg, {
                            viewMode: 1,
                            autoCropArea: 1,
                        });
                        cropActions.style.display = "flex";
                        cropBtn.style.display = "none";
                    }
                });

                cancelCropBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    destroyCropper();
                });

                saveCropBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (cropper) {
                        const canvas = cropper.getCroppedCanvas();
                        canvas.toBlob((blob) => {
                            destroyCropper();

                            if (currentObjectUrl) {
                                URL.revokeObjectURL(currentObjectUrl);
                            }
                            currentObjectUrl = URL.createObjectURL(blob);
                            previewImg.src = currentObjectUrl;
                        }, "image/jpeg");
                    }
                });

                // Handle Click to upload
                dropZone.addEventListener("click", (e) => {
                    // Prevent clicking the buttons or cropper from opening the file dialog
                    if (
                        e.target.closest(".action-btn") ||
                        e.target.closest(".crop-actions") ||
                        e.target.closest(".cropper-container")
                    )
                        return;
                    fileInput.click();
                });

                fileInput.addEventListener("change", (e) => {
                    if (e.target.files.length > 0) {
                        handleFile(e.target.files[0]);
                    }
                });

                // Handle Drag and Drop
                ["dragenter", "dragover", "dragleave", "drop"].forEach(
                    (eventName) => {
                        dropZone.addEventListener(
                            eventName,
                            preventDefaults,
                            false,
                        );
                    },
                );

                function preventDefaults(e) {
                    e.preventDefault();
                    e.stopPropagation();
                }

                ["dragenter", "dragover"].forEach((eventName) => {
                    dropZone.addEventListener(
                        eventName,
                        () => dropZone.classList.add("active"),
                        false,
                    );
                });

                ["dragleave", "drop"].forEach((eventName) => {
                    dropZone.addEventListener(
                        eventName,
                        () => dropZone.classList.remove("active"),
                        false,
                    );
                });

                dropZone.addEventListener("drop", (e) => {
                    const dt = e.dataTransfer;
                    const files = dt.files;

                    if (files.length > 0) {
                        handleFile(files[0]);
                    }
                });

                // Handle Paste
                document.addEventListener("paste", (e) => {
                    const clipboardData =
                        e.clipboardData || window.clipboardData;
                    const items = clipboardData.items;
                    let handled = false;

                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        if (
                            item.kind === "file" &&
                            item.type.startsWith("image/")
                        ) {
                            const blob = item.getAsFile();
                            handleFile(blob);
                            handled = true;
                            break; // Only handle the first image
                        }
                    }

                    if (!handled) {
                        const pastedData = clipboardData.getData("Text");
                        if (pastedData) {
                            try {
                                const url = new URL(pastedData.trim());
                                if (
                                    url.protocol === "http:" ||
                                    url.protocol === "https:"
                                ) {
                                    handleUrl(url.href);
                                }
                            } catch (err) {
                                // Not a valid URL
                            }
                        }
                    }
                });

                function handleUrl(url) {
                    destroyCropper();
                    if (currentObjectUrl) {
                        URL.revokeObjectURL(currentObjectUrl);
                        currentObjectUrl = null;
                    }
                    previewImg.src = url;
                    previewContainer.style.display = "flex";
                }

                // Handle File Processing
                function handleFile(file) {
                    if (!file || !file.type.startsWith("image/")) {
                        alert("Please upload an image file.");
                        return;
                    }

                    destroyCropper();

                    // Clean up previous object URL to avoid memory leaks
                    if (currentObjectUrl) {
                        URL.revokeObjectURL(currentObjectUrl);
                    }

                    currentObjectUrl = URL.createObjectURL(file);
                    previewImg.src = currentObjectUrl;
                    previewContainer.style.display = "flex";
                }

                // Handle Delete
                deleteBtn.addEventListener("click", (e) => {
                    e.stopPropagation(); // Stop event from bubbling up to dropZone click
                    clearPreview();
                });

                function clearPreview() {
                    destroyCropper();
                    if (currentObjectUrl) {
                        URL.revokeObjectURL(currentObjectUrl);
                        currentObjectUrl = null;
                    }
                    previewImg.src = "";
                    previewContainer.style.display = "none";
                    fileInput.value = ""; // Reset file input
                }
            });
        </script>
    </body>
</html>
