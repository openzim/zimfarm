name: Worker QA

on:
  pull_request:
    paths:
      - "worker/**"
  push:
    paths:
      - "worker/**"
    branches:
      - main

jobs:
  check-qa:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: worker/pyproject.toml
          architecture: x64

      - name: Install dependencies (and project)
        working-directory: worker
        run: |
          pip install -U pip
          pip install -e .[qa,scripts,test,task]

      - name: Check Linting
        working-directory: worker
        run: inv check-lint

      - name: Check Formatting
        working-directory: worker
        run: inv check-format

      - name: Check Type
        working-directory: worker
        run: inv check-type
